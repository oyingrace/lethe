services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lethe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lethe}
      POSTGRES_DB: ${POSTGRES_DB:-lethe}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lethe}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  # Optional reverse proxy / TLS termination for the ECS host. Not started by
  # default locally; bring up explicitly with `--profile proxy` once you have
  # a domain pointed at the ECS instance.
  caddy:
    image: caddy:2-alpine
    profiles: ["proxy"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - server
    ports:
      - "80:80"
      - "443:443"

volumes:
  pgdata:
  caddy_data:
